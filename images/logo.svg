<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Outer glow ring -->
  <circle cx="40" cy="40" r="38" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Glass background disc -->
  <circle cx="40" cy="40" r="34" fill="url(#glassBg)" stroke="url(#goldGrad)" stroke-width="1.2"/>

  <!-- Lotus petals - outer layer (3 petals) -->
  <path d="M40 52 C28 52 20 42 20 34 C20 26 28 20 40 28 C52 20 60 26 60 34 C60 42 52 52 40 52Z" fill="url(#lotusOuter)" opacity="0.2"/>

  <!-- Lotus petals - middle layer (5 petals) -->
  <path d="M40 50 C26 50 16 38 16 28 C16 18 28 14 40 24 C52 14 64 18 64 28 C64 38 54 50 40 50Z" fill="url(#lotusGrad)" opacity="0.4"/>

  <!-- Lotus petals - inner layer -->
  <path d="M40 48 C30 48 22 38 22 30 C22 22 30 18 40 26 C50 18 58 22 58 30 C58 38 50 48 40 48Z" fill="url(#lotusGrad)" opacity="0.6"/>

  <!-- Lotus center petals -->
  <path d="M40 44 C33 44 27 36 27 30 C27 24 33 22 40 28 C47 22 53 24 53 30 C53 36 47 44 40 44Z" fill="url(#lotusInner)" opacity="0.9"/>

  <!-- Top highlight on center -->
  <path d="M40 40 C35 40 31 35 31 31 C31 27 35 26 40 30 C45 26 49 27 49 31 C49 35 45 40 40 40Z" fill="url(#centerHighlight)"/>

  <!-- Central energy dot -->
  <circle cx="40" cy="31" r="3" fill="#d4af37" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="31" r="6" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4">
    <animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Radiating lines (spa vibes) -->
  <g opacity="0.2">
    <line x1="40" y1="10" x2="40" y2="4" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="76" x2="40" y2="70" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="10" y1="40" x2="4" y2="40" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="76" y1="40" x2="70" y2="40" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="18" x2="14" y2="14" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="66" y1="18" x2="70" y2="14" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="18" y1="62" x2="14" y2="66" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="66" y1="62" x2="70" y2="66" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="glassBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>

    <linearGradient id="lotusGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14a89d"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <linearGradient id="lotusInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14a89d"/>
      <stop offset="100%" stop-color="#0b5c56"/>
    </linearGradient>

    <linearGradient id="lotusOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962e"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4c65a"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8962e"/>
    </linearGradient>

    <radialGradient id="centerHighlight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e4c65a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#14a89d" stop-opacity="0.1"/>
    </radialGradient>
  </defs>
</svg>
